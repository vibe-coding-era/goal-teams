name: Goal Teams checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: V2.3 release gates (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.13'
      - name: Structure, schema, negative, canonical, security, and context gates
        env:
          GOAL_TEAMS_INSTALL_VALIDATION: '0'
          GOAL_TEAMS_REQUIRE_CROSS_PYTHON: '1'
          PYTHON: python3.11
          PYTHONDONTWRITEBYTECODE: '1'
        run: ./scripts/check.sh
      - name: Installer lifecycle and transaction fault injection
        env:
          GOAL_TEAMS_INSTALL_VALIDATION: '0'
          PYTHONDONTWRITEBYTECODE: '1'
        run: python3.11 scripts/checks/check-install-lifecycle.py
